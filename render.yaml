services:
  - type: web
    name: vertex-ai-chatbot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: AI_PROVIDER
        value: groq
      - key: FLASK_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
